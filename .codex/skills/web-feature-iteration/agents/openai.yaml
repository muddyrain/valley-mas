interface:
  display_name: "Web 功能迭代"
  short_description: "只维护 apps/web 的活跃 backlog（不含 climber/unity），做完就移出并补下一项"
  default_prompt: "当用户要盘点 Valley MAS Web（apps/web）还能做什么、决定下一项、开始做其中一项，或要求删掉旧任务继续迭代时，先维护 .codex/skills/web-feature-iteration/WEB-TASKS.md 并把活跃 backlog 收口到 3 到 5 项，再优先选择最能延长现有能力、能形成完整闭环的下一项直接落地；完成后移出已做项，并刷新新的下一步。明确排除 packages/climber-game 与 apps/unity-climber。"
