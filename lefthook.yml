# Lefthook - Git Hooks 配置
# 文档: https://github.com/evilmartians/lefthook/blob/master/docs/configuration.md

# 🎨 Pre-commit：提交前检查 staged 文件（Biome 自动修复 + 自动暂存）
pre-commit:
  parallel: false

  commands:
    biome-check:
      glob: "*.{js,ts,jsx,tsx,json,jsonc,css,scss}"
      run: pnpm biome check --write --no-errors-on-unmatched --files-ignore-unknown=true {staged_files}
      stage_fixed: true
      fail_text: |
        ❌ Biome 检查失败！
        已自动修复并暂存可修复项；剩余问题请手动处理后再提交
        手动修复：pnpm biome check --write --files-ignore-unknown=true {staged_files}

# 🚀 Pre-push：推送前构建检查
pre-push:
  commands:
    build-check:
      run: pnpm turbo build
      fail_text: |
        ❌ 构建失败！请修复后再推送
        手动测试：pnpm turbo build

# 📝 Commit-msg：提交信息检查（Conventional Commits）
commit-msg:
  commands:
    # 使用 Node.js 脚本进行跨平台检查
    message-format:
      run: node scripts/check-commit-msg.js {1}
      fail_text: |
        ❌ Commit message 格式不符合 Conventional Commits 规范
        💡 修改后重新提交即可

# ⚙️ 全局配置
colors: true      # 彩色输出
no_tty: false     # 允许交互式输入
min_version: 1.0.0

# 输出控制
output:
  - summary       # 显示摘要
  - success       # 显示成功信息
  - failure       # 显示失败信息

# 如果想要更安静的输出，使用这个：
# skip_output:
#   - meta
#   - success
