# air 热重载配置（https://github.com/air-verse/air）
root = "."
tmp_dir = "tmp"

[build]
  # 构建前先运行 swag init 生成文档
  # Windows 下 pre_cmd 不支持，改用手动执行或移除
  # pre_cmd = ["swag init --exclude tmp,data"]
  
  cmd = "go build -o ./tmp/main ./cmd/local"

  # Air v1.65+ 推荐使用 entrypoint，避免回退到默认 ./tmp/main。
  entrypoint = "./tmp/main"

  # 监听参数
  delay = 500
  include_ext = ["go", "tpl", "tmpl", "html", "css", "js", "json", "yaml", "yml"]
  exclude_dir = ["assets", "tmp", "vendor", ".git", "data", "docs"]  # 排除 docs 避免 swag 生成文件触发重载

[color]
  main = "yellow"
  watcher = "cyan"
  build = "green"
