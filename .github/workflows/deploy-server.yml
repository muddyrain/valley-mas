name: Deploy Go Server

on:
  push:
    branches:
      - master
      - main
    paths:
      - "server/**"
      - ".github/workflows/deploy-server.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "${{ secrets.SERVER_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy on server
        run: |
          ssh \
            -p "${{ secrets.SERVER_PORT }}" \
            -o BatchMode=yes \
            -o ConnectTimeout=20 \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=8 \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" 'bash -se' <<EOF
            set -euo pipefail
            echo "[1/7] verify PDF renderer"
            command -v pdftocairo
            pdftocairo -v

            echo "[2/7] sync code"
            cd /opt/valley-mas
            git fetch --all --prune
            git checkout "${{ github.ref_name }}"
            git pull --ff-only origin "${{ github.ref_name }}"

            echo "[3/7] download modules"
            cd server
            /usr/local/go/bin/go mod download

            echo "[4/7] test server"
            /usr/local/go/bin/go test ./...

            echo "[5/7] build server"
            /usr/local/go/bin/go build -o /opt/valley/bin/valley-server ./cmd/server

            echo "[6/7] restart service"
            sudo -n /usr/bin/systemctl restart valley-server

            echo "[7/7] service status"
            /usr/bin/systemctl status valley-server --no-pager | head -n 20
          EOF
