<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Life Trace mark</title>
  <desc id="desc">A simple app-style icon with one continuous life trace orbit and an agent focus point.</desc>
